name: blogify_flutter_main
description: "Blogify - A Blogs and Articles mobile Flutter app"

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.8.0
  auto_route: ^9.3.0+1
  provider: ^6.1.2
  intl: ^0.20.2
  flutter_card_swiper: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  auto_route_generator: ^9.3.1
  build_runner: ^2.4.15

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: SFPro
      fonts:
        - asset: assets/fonts/SFPro-Regular.ttf
          weight: 400
        - asset: assets/fonts/SFPro-Medium.otf
          weight: 500
        - asset: assets/fonts/SFPro-Semibold.otf
          weight: 600
